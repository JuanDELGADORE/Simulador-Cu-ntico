<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cuántico - Principio de Incertidumbre</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            margin: 0;
            padding: 15px; 
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        .header h1 {
            margin-top: 0;
            font-size: 1.8em;
        }
        p.description {
            color: #a2a2bd;
            font-size: 1em;
            margin-bottom: 15px;
        }
        
        /* Contenedor del Slider Maestro */
        .master-controls {
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            text-align: center;
        }
        input[type=range] {
            width: 80%;
            max-width: 500px;
            cursor: pointer;
            margin: 10px 0;
        }
        .stats-master {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 1.1em;
            font-weight: bold;
            color: #4ecca3;
        }

        /* Layout de las dos columnas */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .panel {
            flex: 1;
            min-width: 350px; 
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .panel h2 {
            text-align: center;
            color: #e94560;
            margin-top: 0;
            font-size: 1.3em;
        }

        /* Estilos específicos Panel Izquierdo (Chart.js) */
        .chart-box {
            background: white; 
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            height: 250px; 
            position: relative;
        }

        /* Estilos específicos Panel Derecho (Canvas) */
        .canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        canvas {
            background-color: #0f3460;
            border-radius: 10px;
            width: 100%;
            max-width: 400px; 
            height: auto;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .divulgativo-text {
            text-align: center;
            color: #a2a2bd;
            font-weight: bold;
            margin-top: 15px;
            font-size: 0.95em;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Principio de Incertidumbre de Heisenberg</h1>
        <p class="description">Dashboard interactivo: Sincronización del formalismo analítico y la intuición espacial.</p>
    </div>

    <div class="master-controls">
        <label for="masterSlider"><strong>Ajustar el Estado Cuántico (Control de Dispersión Δk)</strong></label><br>
        <input type="range" id="masterSlider" min="0.1" max="3" step="0.05" value="0.8">
        
        <div class="stats-master">
            <div id="masterDx">Δx ≈ 0.6250</div>
            <div id="masterDk">Δk = 0.8000</div>
            <div>Δx × Δk = 0.5000</div>
        </div>
    </div>

    <div class="dashboard">
        
        <div class="panel">
            <h2>Formalismo: Envolventes</h2>
            <div class="chart-box">
                <canvas id="positionChart"></canvas>
            </div>
            <div class="chart-box">
                <canvas id="momentumChart"></canvas>
            </div>
        </div>

        <div class="panel">
            <h2>Intuición: Nube y Corriente</h2>
            <div class="canvas-container">
                <canvas id="quantumCanvas" width="400" height="400"></canvas>
            </div>
            <div class="divulgativo-text" id="divulgativoText">
                Precisión en Posición: Media <br> Incertidumbre en Velocidad: Media
            </div>
        </div>

    </div>

    <script>
        /* =========================================
           LÓGICA DEL PANEL IZQUIERDO (CHART.JS)
           ========================================= */
        function gaussian(x, sigma) {
            const coef = 1 / (sigma * Math.sqrt(2 * Math.PI));
            const expo = Math.exp(-0.5 * Math.pow(x / sigma, 2));
            return coef * expo;
        }

        function generateData(sigma, limit = 10, points = 200) {
            const labels = [];
            const data = [];
            const step = (2 * limit) / points;
            for (let i = -limit; i <= limit; i += step) {
                labels.push(i.toFixed(2));
                data.push(gaussian(i, sigma));
            }
            return { labels, data };
        }

        const ctxPos = document.getElementById('positionChart').getContext('2d');
        const ctxMom = document.getElementById('momentumChart').getContext('2d');

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false, 
            animation: { duration: 0 }, 
            elements: { point: { radius: 0 } }, 
            scales: {
                x: { ticks: { maxTicksLimit: 11 } },
                y: { min: -2.5, max: 2.5 } 
            }
        };

        const posOptions = {
            ...commonOptions,
            plugins: {
                legend: { labels: { color: '#333' } },
                title: { display: true, text: 'Espacio de Posición (Δx)', color: '#1a1a2e', font: { size: 14 } }
            }
        };

        const momOptions = {
            ...commonOptions,
            plugins: {
                legend: { labels: { color: '#333' } },
                title: { display: true, text: 'Espacio de Momento (Δk)', color: '#1a1a2e', font: { size: 14 } }
            }
        };

        let posChart = new Chart(ctxPos, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: '|Ψ(x)|² (Superior)', borderColor: 'rgba(54, 162, 235, 1)', backgroundColor: 'rgba(54, 162, 235, 0.2)', borderWidth: 2, fill: true, data: [] },
                    { label: '|Ψ(x)|² (Inferior)', borderColor: 'rgba(54, 162, 235, 1)', backgroundColor: 'rgba(54, 162, 235, 0.1)', borderWidth: 2, fill: true, data: [] }
                ]
            },
            options: posOptions
        });

        let momChart = new Chart(ctxMom, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: '|Φ(k)|² (Superior)', borderColor: 'rgba(255, 99, 132, 1)', backgroundColor: 'rgba(255, 99, 132, 0.2)', borderWidth: 2, fill: true, data: [] },
                    { label: '|Φ(k)|² (Inferior)', borderColor: 'rgba(255, 99, 132, 1)', backgroundColor: 'rgba(255, 99, 132, 0.1)', borderWidth: 2, fill: true, data: [] }
                ]
            },
            options: momOptions
        });


        /* =========================================
           LÓGICA DEL PANEL DERECHO (CANVAS)
           ========================================= */
        const canvas = document.getElementById('quantumCanvas');
        const ctxCanvas = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        const sharedBaseAngle = -Math.PI / 4; 
        const vectorPoints = [];
        
        // CORRECCIÓN FÍSICA Y GRÁFICA:
        for(let i = 0; i < 60; i++) {
            const r = Math.sqrt(Math.random()) * 1.2; 
            const theta = Math.random() * 2 * Math.PI;
            vectorPoints.push({
                normX: r * Math.cos(theta),
                normY: r * Math.sin(theta),
                baseAngle: sharedBaseAngle 
            });
        }

        let currentSigmaXCanvas = 80;
        let currentSigmaPCanvas = 40;

        function drawArrow(x, y, length, angle) {
            ctxCanvas.beginPath();
            ctxCanvas.moveTo(x, y);
            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;
            ctxCanvas.lineTo(endX, endY);
            
            const arrowSize = Math.min(length * 0.3, 10);
            ctxCanvas.lineTo(endX - arrowSize * Math.cos(angle - Math.PI / 6), endY - arrowSize * Math.sin(angle - Math.PI / 6));
            ctxCanvas.moveTo(endX, endY);
            ctxCanvas.lineTo(endX - arrowSize * Math.cos(angle + Math.PI / 6), endY - arrowSize * Math.sin(angle + Math.PI / 6));
            
            ctxCanvas.strokeStyle = 'rgba(233, 69, 96, 0.8)';
            ctxCanvas.lineWidth = 2;
            ctxCanvas.stroke();
        }

        function drawCanvasScene() {
            ctxCanvas.clearRect(0, 0, canvas.width, canvas.height);

            const gradient = ctxCanvas.createRadialGradient(centerX, centerY, 0, centerX, centerY, currentSigmaXCanvas);
            gradient.addColorStop(0, 'rgba(78, 204, 163, 0.8)');
            gradient.addColorStop(0.5, 'rgba(78, 204, 163, 0.3)');
            gradient.addColorStop(1, 'rgba(78, 204, 163, 0)');

            ctxCanvas.beginPath();
            ctxCanvas.arc(centerX, centerY, currentSigmaXCanvas, 0, Math.PI * 2);
            ctxCanvas.fillStyle = gradient;
            ctxCanvas.fill();

            // NUEVA LÓGICA: Determinar el número de vectores visibles basándose en la incertidumbre del momento
            // Map the currentSigmaPCanvas (range approx. 12 to 240) to a number of vectors (1 to 60)
            let maxVectors = 60;
            let numVisibleVectors = Math.floor((currentSigmaPCanvas / 100) * maxVectors);
            
            // Asegurarse de que siempre se dibuje al menos un vector (la onda plana pura)
            numVisibleVectors = Math.max(1, Math.min(maxVectors, numVisibleVectors));

            // Dibujar solo la cantidad calculada de vectores
            for (let i = 0; i < numVisibleVectors; i++) {
                const point = vectorPoints[i];
                
                const actualX = point.normX * currentSigmaXCanvas;
                const actualY = point.normY * currentSigmaXCanvas;
                
                const randomLength = currentSigmaPCanvas * (0.5 + Math.random() * 0.5);
                const randomAngle = point.baseAngle + (Math.random() - 0.5) * (currentSigmaPCanvas / 20);
                
                drawArrow(centerX + actualX, centerY + actualY, randomLength, randomAngle);
            }
        }

        function animateCanvas() {
            drawCanvasScene();
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();


        /* =========================================
           CONTROL MAESTRO: SINCRONIZADOR
           ========================================= */
        function syncAllVisualizations() {
            const sigmaK = parseFloat(document.getElementById('masterSlider').value);
            const sigmaX = 0.5 / sigmaK; 

            document.getElementById('masterDk').innerText = `Δk = ${sigmaK.toFixed(4)}`;
            document.getElementById('masterDx').innerText = `Δx ≈ ${sigmaX.toFixed(4)}`;

            const posData = generateData(sigmaX, 8);
            const momData = generateData(sigmaK, 8);

            posChart.data.labels = posData.labels;
            posChart.data.datasets[0].data = posData.data; 
            posChart.data.datasets[1].data = posData.data.map(y => -y); 
            posChart.update();

            momChart.data.labels = momData.labels;
            momChart.data.datasets[0].data = momData.data; 
            momChart.data.datasets[1].data = momData.data.map(y => -y); 
            momChart.update();

            currentSigmaXCanvas = sigmaX * 64; 
            currentSigmaPCanvas = 4000 / currentSigmaXCanvas;

            const textDiv = document.getElementById('divulgativoText');
            if (currentSigmaXCanvas < 48) {
                textDiv.innerHTML = "Precisión en Posición: ALTA (Partícula acorralada) <br> <span style='color:#e94560;'>Incertidumbre en Velocidad: ALTA (Momento caótico)</span>";
            } else if (currentSigmaXCanvas > 120) {
                textDiv.innerHTML = "Precisión en Posición: BAJA (Nube muy difusa) <br> <span style='color:#e94560;'>Incertidumbre en Velocidad: BAJA (Momento predecible)</span>";
            } else {
                textDiv.innerHTML = "Precisión en Posición: Media <br> <span style='color:#e94560;'>Incertidumbre en Velocidad: Media</span>";
            }
        }

        document.getElementById('masterSlider').addEventListener('input', syncAllVisualizations);
        syncAllVisualizations();
    </script>
</body>
</html>
