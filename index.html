<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principio de Incertidumbre - Paquete Gaussiano</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .controls-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }
        .slider-wrapper {
            margin: 20px 0;
        }
        input[type=range] {
            width: 80%;
            max-width: 400px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 15px;
        }
        .charts-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .chart-box {
            flex: 1;
            min-width: 300px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Simulador: Principio de Incertidumbre de Heisenberg</h1>
        <p>Visualización del espacio de posición y momento para un paquete de ondas Gaussiano.</p>
    </div>

    <div class="controls-container">
        <h3>Control de Dispersión</h3>
        <div class="slider-wrapper">
            <label for="sigmaKSlider"><strong>Δk (Dispersión en momento):</strong> <span id="kValue">0.80</span></label><br>
            <input type="range" id="sigmaKSlider" min="0.1" max="3" step="0.05" value="0.8">
        </div>
        
        <div class="stats">
            <div id="dxDisplay">Δx ≈ 0.6250</div>
            <div id="productDisplay">Δx × Δk = 0.5000</div>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            <canvas id="positionChart"></canvas>
        </div>
        <div class="chart-box">
            <canvas id="momentumChart"></canvas>
        </div>
    </div>

    <script>
        // Función para calcular la campana de Gauss
        function gaussian(x, sigma) {
            const coef = 1 / (sigma * Math.sqrt(2 * Math.PI));
            const expo = Math.exp(-0.5 * Math.pow(x / sigma, 2));
            return coef * expo;
        }

        // Generar datos para los ejes X y K
        function generateData(sigma, limit = 10, points = 200) {
            const labels = [];
            const data = [];
            const step = (2 * limit) / points;
            for (let i = -limit; i <= limit; i += step) {
                labels.push(i.toFixed(2));
                data.push(gaussian(i, sigma));
            }
            return { labels, data };
        }

        // Configuración inicial de las gráficas
        const ctxPos = document.getElementById('positionChart').getContext('2d');
        const ctxMom = document.getElementById('momentumChart').getContext('2d');

        const commonOptions = {
            responsive: true,
            animation: { duration: 0 }, // Cero para interactividad fluida
            elements: { point: { radius: 0 } }, // Ocultar puntos
            scales: {
                x: { ticks: { maxTicksLimit: 11 } },
                y: { min: 0, max: 2.5 } // Fijar el eje Y para ver cómo cambia la amplitud
            }
        };

        let posChart = new Chart(ctxPos, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '|Ψ(x)|² (Densidad en Posición)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    data: []
                }]
            },
            options: commonOptions
        });

        let momChart = new Chart(ctxMom, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '|Φ(k)|² (Distribución en Momento)',
                    borderColor: 'rgba(255, 99, 132, 1)',
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    data: []
                }]
            },
            options: commonOptions
        });

        // Función de actualización interactiva
        function updateCharts() {
            const sigmaK = parseFloat(document.getElementById('sigmaKSlider').value);
            const sigmaX = 0.5 / sigmaK; // Relación de incertidumbre mínima

            // Actualizar textos
            document.getElementById('kValue').innerText = sigmaK.toFixed(2);
            document.getElementById('dxDisplay').innerText = `Δx ≈ ${sigmaX.toFixed(4)}`;
            document.getElementById('productDisplay').innerText = `Δx × Δk = ${(sigmaX * sigmaK).toFixed(4)}`;

            // Actualizar datos de gráficas (Rango de -8 a 8 para visualizar bien la campana)
            const posData = generateData(sigmaX, 8);
            const momData = generateData(sigmaK, 8);

            posChart.data.labels = posData.labels;
            posChart.data.datasets[0].data = posData.data;
            posChart.update();

            momChart.data.labels = momData.labels;
            momChart.data.datasets[0].data = momData.data;
            momChart.update();
        }

        // Escuchar cambios en el deslizador
        document.getElementById('sigmaKSlider').addEventListener('input', updateCharts);

        // Renderizado inicial
        updateCharts();
    </script>
</body>
</html>
