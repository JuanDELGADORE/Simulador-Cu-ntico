<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principio de Incertidumbre - Visualización Divulgativa</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .controls-container {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        input[type=range] {
            width: 80%;
            max-width: 400px;
            cursor: pointer;
        }
        .slider-wrapper {
            margin: 15px 0;
        }
        canvas {
            background-color: #0f3460;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 100%;
            height: auto;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 1.2em;
            margin-top: 15px;
            color: #e94560;
            font-weight: bold;
        }
        p.description {
            color: #a2a2bd;
            font-size: 1.1em;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <h1>¿Dónde está y hacia dónde va?</h1>
    <p class="description">El Principio de Incertidumbre nos dice que no podemos conocer con exactitud ambas cosas a la vez.<br>Ajusta el tamaño de la nube (posición) y observa qué le pasa a las flechas (momento/velocidad).</p>

    <div class="controls-container">
        <div class="slider-wrapper">
            <label for="uncertaintySlider"><strong>Tamaño de la Nube (Incertidumbre en Posición - Δx)</strong></label><br><br>
            <input type="range" id="uncertaintySlider" min="20" max="250" step="1" value="150">
        </div>
        
        <div class="stats">
            <div id="dxDisplay">Precisión en Posición: Baja</div>
            <div id="dpDisplay">Incertidumbre en Momento: Baja</div>
        </div>
    </div>

    <canvas id="quantumCanvas" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('quantumCanvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('uncertaintySlider');
        const dxDisplay = document.getElementById('dxDisplay');
        const dpDisplay = document.getElementById('dpDisplay');

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        // CORRECCIÓN FÍSICA: Definimos UN solo momento base para todo el estado cuántico.
        // Elegimos un ángulo arbitrario (ej. -pi/4 apuntando hacia arriba a la derecha).
        const sharedBaseAngle = -Math.PI / 4; 

        // Generamos posiciones aleatorias fijas para las flechas dentro de un área máxima
        const vectorPoints = [];
        for(let i = 0; i < 60; i++) {
            vectorPoints.push({
                x: (Math.random() - 0.5) * 400,
                y: (Math.random() - 0.5) * 400,
                baseAngle: sharedBaseAngle // Todas apuntan inicialmente en la misma dirección
            });
        }

        function drawArrow(x, y, length, angle) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;
            ctx.lineTo(endX, endY);
            
            // Cabeza de la flecha
            const arrowSize = Math.min(length * 0.3, 10);
            ctx.lineTo(endX - arrowSize * Math.cos(angle - Math.PI / 6), endY - arrowSize * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(endX, endY);
            ctx.lineTo(endX - arrowSize * Math.cos(angle + Math.PI / 6), endY - arrowSize * Math.sin(angle + Math.PI / 6));
            
            ctx.strokeStyle = 'rgba(233, 69, 96, 0.8)'; // Color rojizo para el momento
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawScene() {
            // Limpiar lienzo
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Obtener valor de delta X (radio de la nube)
            const sigmaX = parseFloat(slider.value);
            
            // Calcular delta P (momento) inversamente proporcional
            // Constante arbitraria para que se vea bien en pantalla
            const sigmaP = 5000 / sigmaX; 

            // 1. Dibujar la Nube de Probabilidad (Posición)
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, sigmaX);
            gradient.addColorStop(0, 'rgba(78, 204, 163, 0.8)'); // Centro brillante
            gradient.addColorStop(0.5, 'rgba(78, 204, 163, 0.3)');
            gradient.addColorStop(1, 'rgba(78, 204, 163, 0)'); // Borde difuminado

            ctx.beginPath();
            ctx.arc(centerX, centerY, sigmaX, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // 2. Dibujar las flechas de Momento
            vectorPoints.forEach(point => {
                // Solo dibujar flechas que caigan más o menos dentro de la nube actual
                const distFromCenter = Math.sqrt(point.x*point.x + point.y*point.y);
                if (distFromCenter < sigmaX * 1.2) {
                    
                    // La longitud y la variación del ángulo dependen de la incertidumbre del momento (sigmaP)
                    // Con poca incertidumbre, randomAngle se mantiene fiel a baseAngle.
                    const randomLength = sigmaP * (0.5 + Math.random() * 0.5);
                    const randomAngle = point.baseAngle + (Math.random() - 0.5) * (sigmaP / 20);

                    drawArrow(centerX + point.x, centerY + point.y, randomLength, randomAngle);
                }
            });

            // 3. Actualizar textos de la interfaz para ser divulgativos
            if (sigmaX < 60) {
                dxDisplay.innerText = "Precisión en Posición: ALTA (Lo tenemos arrinconado)";
                dpDisplay.innerText = "Incertidumbre en Velocidad: ALTA (Momento caótico)";
            } else if (sigmaX > 180) {
                dxDisplay.innerText = "Precisión en Posición: BAJA (Nube difusa)";
                dpDisplay.innerText = "Incertidumbre en Velocidad: BAJA (Momento predecible)";
            } else {
                dxDisplay.innerText = "Precisión en Posición: Media";
                dpDisplay.innerText = "Incertidumbre en Velocidad: Media";
            }
        }

        // Animar para que el momento "vibre" y se sienta caótico
        function animate() {
            drawScene();
            requestAnimationFrame(animate);
        }

        // Iniciar
        animate();
    </script>
</body>
</html>
