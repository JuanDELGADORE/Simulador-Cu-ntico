<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espacio de Fases Cuántico - Función de Wigner</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .controls-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }
        .slider-wrapper {
            margin: 20px 0;
        }
        input[type=range] {
            width: 80%;
            max-width: 400px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 15px;
        }
        .chart-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            height: 600px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Simulador: Función de Wigner en el Espacio de Fases</h1>
        <p>Visualización del límite incompresible del Principio de Incertidumbre para un estado Gaussiano.</p>
    </div>

    <div class="controls-container">
        <h3>Control del Estado Cuántico</h3>
        <div class="slider-wrapper">
            <label for="sigmaKSlider"><strong>Δp (Incertidumbre en momento):</strong> <span id="kValue">1.00</span></label><br>
            <input type="range" id="sigmaKSlider" min="0.25" max="2.0" step="0.05" value="1.0">
        </div>
        
        <div class="stats">
            <div id="dxDisplay">Δx = 0.5000</div>
            <div id="productDisplay">Δx × Δp = 0.5000 (Límite ħ/2)</div>
        </div>
    </div>

    <div class="chart-box">
        <div id="wignerPlot" style="width: 100%; height: 100%;"></div>
    </div>

    <script>
        // Configuración de la malla (Grid)
        const gridSize = 100;
        const limit = 4;
        const xValues = [];
        const pValues = [];
        
        for (let i = 0; i <= gridSize; i++) {
            let val = -limit + (2 * limit * i) / gridSize;
            xValues.push(val);
            pValues.push(val);
        }

        // Función para calcular la matriz de Wigner W(x, p)
        function calculateWignerMatrix(sigmaP) {
            const sigmaX = 0.5 / sigmaP; // Relación estricta del paquete gaussiano
            const zValues = [];

            for (let i = 0; i < pValues.length; i++) {
                const p = pValues[i];
                const row = [];
                for (let j = 0; j < xValues.length; j++) {
                    const x = xValues[j];
                    // W(x,p) para un paquete gaussiano (con hbar = 1)
                    // W(x,p) = (1/pi) * exp( -x^2/(2*sigmaX^2) - p^2/(2*sigmaP^2) )
                    const exponent = -Math.pow(x, 2) / (2 * Math.pow(sigmaX, 2)) - Math.pow(p, 2) / (2 * Math.pow(sigmaP, 2));
                    const w = (1 / Math.PI) * Math.exp(exponent);
                    row.push(w);
                }
                zValues.push(row);
            }
            return { zValues, sigmaX };
        }

        // Renderizado inicial con Plotly
        const initialSigmaP = 1.0;
        const initialData = calculateWignerMatrix(initialSigmaP);

        const data = [{
            z: initialData.zValues,
            x: xValues,
            y: pValues,
            type: 'contour', // Mapa de contorno topográfico
            colorscale: 'Portland',
            contours: {
                coloring: 'heatmap'
            },
            colorbar: {
                title: 'W(x,p)',
                titleside: 'right'
            }
        }];

        const layout = {
            title: 'Distribución de Cuasiprobabilidad W(x,p)',
            xaxis: { title: 'Posición (x)', range: [-limit, limit] },
            yaxis: { title: 'Momento (p)', range: [-limit, limit] },
            autosize: true,
            margin: { l: 60, r: 20, b: 60, t: 40 }
        };

        Plotly.newPlot('wignerPlot', data, layout, {responsive: true});

        // Función de actualización interactiva
        function updatePlot() {
            const sigmaP = parseFloat(document.getElementById('sigmaKSlider').value);
            const { zValues, sigmaX } = calculateWignerMatrix(sigmaP);

            // Actualizar interfaz
            document.getElementById('kValue').innerText = sigmaP.toFixed(2);
            document.getElementById('dxDisplay').innerText = `Δx = ${sigmaX.toFixed(4)}`;

            // Actualizar los datos Z de la gráfica de Plotly sin recargar todo el layout
            Plotly.update('wignerPlot', { z: [zValues] });
        }

        // Escuchar cambios en el deslizador (usamos 'input' para actualización en tiempo real)
        document.getElementById('sigmaKSlider').addEventListener('input', updatePlot);
    </script>
</body>
</html>
